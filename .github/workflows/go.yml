name: Go
permissions:
  contents: read

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    timeout-minutes: 15
    name: Lint Test and Build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"
          check-latest: true
      - name: Set up gotestfmt
        uses: GoTestTools/gotestfmt-action@eba2ac97f623e866e7b1b117c99f18b43cd36d18 # v2.3.0
        with:
          repo: gotestfmt
          version: v2.2.0
      - name: Build
        run: make build
      - name: Unit Tests
        run: |
          ulimit -n 65536
          sudo sysctl -w fs.aio-max-nr=30000000
          sudo sysctl -w fs.file-max=30000000
          sudo make scylla-setup
          export GEMINI_USE_DOCKER_SCYLLA=true
          export GEMINI_TEST_CLUSTER_IP=192.168.100.3
          export GEMINI_ORACLE_CLUSTER_IP=192.168.100.2

          make test
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        name: Linting
        with:
          install-mode: goinstall
